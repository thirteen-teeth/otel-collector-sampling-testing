name: Tail-Sampling Smoke Test

# Runs on every pull request and can be triggered manually.
# Uses standard GitHub-hosted Linux runners (2 CPU, 7 GB RAM).
#
# Workload (scaled for CI constraints while preserving both traffic classes):
#   5 low-volume  services × 1,000  traces  =    5,000 traces
#  10 high-volume services × 20,000 traces  =  200,000 traces
#  Total: 205,000 traces, 2–5 spans each, 10% tail sampling, 5s decision wait

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      low_volume_services:
        description: "Number of low-volume services"
        required: false
        default: "5"
      low_volume_traces:
        description: "Traces per low-volume service"
        required: false
        default: "1000"
      high_volume_services:
        description: "Number of high-volume services"
        required: false
        default: "10"
      high_volume_traces:
        description: "Traces per high-volume service"
        required: false
        default: "20000"

# Cancel in-progress runs for the same PR to save CI minutes.
concurrency:
  group: "tail-sampling-smoke-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  checks: write        # for JUnit test result publishing

jobs:
  smoke-test:
    name: Smoke Test (${{ github.event_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # ── Workload ──────────────────────────────────────────────────────────
      LOW_VOLUME_SERVICES:  "${{ github.event.inputs.low_volume_services  || '5'     }}"
      LOW_VOLUME_TRACES:    "${{ github.event.inputs.low_volume_traces    || '1000'  }}"
      HIGH_VOLUME_SERVICES: "${{ github.event.inputs.high_volume_services || '10'    }}"
      HIGH_VOLUME_TRACES:   "${{ github.event.inputs.high_volume_traces   || '20000' }}"
      MIN_SPANS: "2"
      MAX_SPANS: "5"
      # ── Sampling ─────────────────────────────────────────────────────────
      DECISION_WAIT:    "5s"
      NUM_TRACES:       "75000"
      SAMPLED_CACHE_SIZE:     "100000"
      NON_SAMPLED_CACHE_SIZE: "1000000"
      # ── Collector image ───────────────────────────────────────────────────
      OTELCOL_VERSION: "0.108.0"
      # ── Container memory ─────────────────────────────────────────────────
      KAFKA_MEMORY:   "768m"
      INGEST_MEMORY:  "640m"
      SAMPLER_MEMORY: "1280m"
      INGEST_MEMORY_LIMIT_MIB: "512"
      INGEST_SPIKE_LIMIT_MIB:  "128"
      SAMPLER_MEMORY_LIMIT_MIB: "1024"
      SAMPLER_SPIKE_LIMIT_MIB:  "256"
      # ── Kafka ────────────────────────────────────────────────────────────
      KAFKA_PARTITIONS: "6"
      KAFKA_GROUP_ID: "otel-tail-sampler-smoke-v1"
      KAFKA_BROKERS: "localhost:9092"
      # ── Test run identity ─────────────────────────────────────────────────
      TEST_RUN_ID: "smoke-${{ github.run_id }}-${{ github.run_attempt }}"
      GENERATOR_SEED: "42"
      # ── Metrics URLs ─────────────────────────────────────────────────────
      INGEST_METRICS_URL: "http://localhost:8888/metrics"
      SAMPLER_METRICS_URL: "http://localhost:8889/metrics"

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Validate collector configs ────────────────────────────────────────
      - name: Validate ingest-collector config
        run: |
          docker run --rm \
            -e KAFKA_BROKER=kafka:9092 \
            -e INGEST_MEMORY_LIMIT_MIB=512 \
            -e INGEST_SPIKE_LIMIT_MIB=128 \
            -v "${{ github.workspace }}/test/config/ingest-collector.yaml:/config/config.yaml:ro" \
            otel/opentelemetry-collector-contrib:${{ env.OTELCOL_VERSION }} \
            validate --config=/config/config.yaml

      - name: Validate tail-sampler config
        run: |
          docker run --rm \
            -e KAFKA_BROKER=kafka:9092 \
            -e KAFKA_GROUP_ID=otel-tail-sampler-smoke-v1 \
            -e DECISION_WAIT=5s \
            -e NUM_TRACES=75000 \
            -e SAMPLED_CACHE_SIZE=100000 \
            -e NON_SAMPLED_CACHE_SIZE=1000000 \
            -e SAMPLER_MEMORY_LIMIT_MIB=1024 \
            -e SAMPLER_SPIKE_LIMIT_MIB=256 \
            -v "${{ github.workspace }}/test/config/tail-sampler.yaml:/config/config.yaml:ro" \
            otel/opentelemetry-collector-contrib:${{ env.OTELCOL_VERSION }} \
            validate --config=/config/config.yaml

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install unit test dependencies
        run: pip install -r test/unit/requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest test/unit/ -v \
            --tb=short \
            --junit-xml=test-results/unit-tests.xml
        env:
          PYTHONPATH: "${{ github.workspace }}/test"

      - name: Install generator dependencies
        run: pip install -r test/generator/requirements.txt

      - name: Install validator dependencies
        run: pip install -r test/validator/requirements.txt

      # ── Start infrastructure ───────────────────────────────────────────────
      - name: Start Kafka and collectors
        working-directory: test
        run: |
          docker compose up -d kafka ingest-collector tail-sampler
        env:
          COMPOSE_PROJECT_NAME: otel-smoke

      - name: Wait for Kafka to be healthy
        run: |
          bash test/scripts/wait-ready.sh \
            http://localhost:13133 \
            "ingest-collector (Kafka readiness proxy)" \
            120 3
          # Also wait for the tail-sampler to be healthy
          bash test/scripts/wait-ready.sh \
            http://localhost:13134 \
            "tail-sampler" \
            120 3

      - name: Collect baseline metrics
        run: |
          mkdir -p artifacts/metrics
          bash test/scripts/collect-metrics.sh baseline
        env:
          OUTPUT_DIR: artifacts/metrics
        continue-on-error: true

      # ── Generate traces ────────────────────────────────────────────────────
      - name: Generate traces
        run: |
          mkdir -p artifacts
          python test/generator/generator.py \
            --run-id "${TEST_RUN_ID}" \
            --seed "${GENERATOR_SEED}" \
            --low-volume-services "${LOW_VOLUME_SERVICES}" \
            --low-volume-traces "${LOW_VOLUME_TRACES}" \
            --high-volume-services "${HIGH_VOLUME_SERVICES}" \
            --high-volume-traces "${HIGH_VOLUME_TRACES}" \
            --min-spans "${MIN_SPANS}" \
            --max-spans "${MAX_SPANS}" \
            --endpoint "localhost:4317" \
            --output artifacts/generator-manifest.json
        env:
          OTLP_ENDPOINT: "localhost:4317"

      # ── Wait for processing ────────────────────────────────────────────────
      - name: Wait for tail-sampling decision window
        run: |
          # decision_wait=5s + buffer for in-flight processing and export
          echo "Waiting 20s for the tail-sampling decision window and draining..."
          sleep 20

      - name: Collect post-generation metrics
        run: |
          bash test/scripts/collect-metrics.sh post-generation
        env:
          OUTPUT_DIR: artifacts/metrics
        continue-on-error: true

      # ── Validate ──────────────────────────────────────────────────────────
      - name: Run validator
        run: |
          python test/validator/validator.py \
            --run-id "${TEST_RUN_ID}" \
            --brokers "${KAFKA_BROKERS}" \
            --manifest artifacts/generator-manifest.json \
            --output-dir artifacts \
            --timeout-ms 15000

      # ── Collect artifacts & logs ─────────────────────────────────────────
      - name: Collect container logs and stats
        if: always()
        working-directory: test
        run: |
          mkdir -p ../artifacts/logs
          docker compose logs ingest-collector > ../artifacts/logs/ingest-collector.log 2>&1 || true
          docker compose logs tail-sampler     > ../artifacts/logs/tail-sampler.log     2>&1 || true
          docker compose logs kafka            > ../artifacts/logs/kafka.log            2>&1 || true

          # Container resource stats (if running)
          docker stats --no-stream --format \
            "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}" \
            > ../artifacts/container-stats.txt 2>&1 || true
        env:
          COMPOSE_PROJECT_NAME: otel-smoke

      - name: Collect final metrics
        if: always()
        run: |
          bash test/scripts/collect-metrics.sh final
        env:
          OUTPUT_DIR: artifacts/metrics
        continue-on-error: true

      # ── Publish test results ──────────────────────────────────────────────
      - name: Publish JUnit results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: |
            test-results/unit-tests.xml
            artifacts/validation-junit.xml
          check_name: "Tail Sampling – Smoke Test"
          fail_on_failure: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "smoke-test-artifacts-${{ github.run_id }}-${{ github.run_attempt }}"
          path: |
            artifacts/
            test-results/
          retention-days: 30

      # ── Print validation summary ──────────────────────────────────────────
      - name: Print validation summary
        if: always()
        run: |
          echo "=== Validation Results ==="
          if [ -f artifacts/validation.json ]; then
            python3 -c "
          import json, sys
          with open('artifacts/validation.json') as f:
              r = json.load(f)
          print('Overall:', 'PASS' if r['overall_pass'] else 'FAIL')
          print(f'Raw unique traces    : {r[\"raw_unique_total\"]}')
          print(f'Sampled unique traces: {r[\"sampled_unique_total\"]}')
          agg = r.get('aggregate', {})
          print(f'Aggregate rate       : {agg.get(\"sample_rate\", 0)*100:.2f}%')
          print(f'Sigma deviation      : {agg.get(\"sigma_deviation\", \"?\")}σ')
          for f in r.get('failures', []):
              print(f'  FAIL: {f}')
          sys.exit(0 if r['overall_pass'] else 1)
          "
          else
            echo "validation.json not found"
            exit 1
          fi

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: Stop and remove containers
        if: always()
        working-directory: test
        run: docker compose down -v --remove-orphans
        env:
          COMPOSE_PROJECT_NAME: otel-smoke
